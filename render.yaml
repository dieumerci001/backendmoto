services:
  # 1. THE BACKEND
  - type: web
    name: moto-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: DB_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # 2. THE FRONTEND
  - type: web # Change this from 'static' to 'web'
    name: moto-frontend
    runtime: static # This tells Render it's a Static Site
    plan: free
    rootDir: motari-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist # Note: use 'staticPublishPath' for static env
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: moto-backend
          property: host
