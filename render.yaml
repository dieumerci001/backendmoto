services:
  # 1. THE BACKEND
  - type: web
    name: moto-backend
    runtime: node
    buildCommand: npm install
      
    startCommand: node index.js

    envVars:
      - key: PORT
        value: 10000
      - key: DB_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # 2. THE FRONTEND
  - type: web
    name: moto-frontend
    runtime: static
    rootDir: motari-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: moto-backend
          property: host
