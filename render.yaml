services:
  # 1. THE BACKEND
  - type: web
    name: moto-backend
    runtime: node
  # Install backend deps and build frontend into motari-frontend/dist so backend can serve it
  buildCommand: npm install && cd motari-frontend && npm install && npm run build && cd ..
  startCommand: node index.js

    envVars:
      - key: PORT
        # Render will provide a runtime PORT value; this is a fallback for local testing
        value: 10000
      - key: FRONTEND_URL
        fromService:
          type: web
          name: moto-frontend
          property: host
      - key: SERVE_FRONTEND
        value: "true"
      - key: DATABASE_URL
        # For Render managed Postgres DB: set this to the provided DATABASE_URL in the Render dashboard
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false

# NOTE: This manifest config builds the frontend as part of the backend build and serves it
# from the backend. If you prefer to keep a separate frontend Static site service,
# restore or create the moto-frontend service (the original configuration is commented out).

